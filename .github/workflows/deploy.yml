name: CI/CD – Teamflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_DB: teamflow_test
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d teamflow_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-django pytest-cov

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U "${{ env.POSTGRES_USER }}" -d "${{ env.POSTGRES_DB }}" && exit 0
            sleep 1
          done
          exit 1

      - name: Run flake8 (use repo config)
        run: |
          python -m flake8 . --config=.flake8 --extend-ignore=E203,W503,E501,W391

      - name: Run black (check only)
        run: |
          black --check .

      - name: Run pytest with coverage
        env:
          DB_NAME: ${{ env.POSTGRES_DB }}
          DB_USER: ${{ env.POSTGRES_USER }}
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
        run: |
          pytest --cov=core --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/teamflow
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export image digest
        id: digest
        run: echo "IMAGE_DIGEST=${{ steps.build-and-push.outputs.digest }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/teamflow

            echo "Pulling latest web image..."
            docker compose pull web

            echo "Running migrations (one-off)..."
            docker compose run --rm web python manage.py migrate --noinput

            echo "Collecting static files (one-off)..."
            docker compose run --rm web python manage.py collectstatic --noinput

            echo "Rolling update (scale web=2)..."
            docker compose up -d --no-deps --scale web=2 web
            sleep 20

            echo "Switch back to normal scale..."
            docker compose up -d --no-deps web

            echo "Pruning unused Docker images..."
            docker image prune -f

      - name: Health check
        run: |
          curl -f https://yourdomain.uz/health/ || (echo "Health check failed" && exit 1)

      - name: Deployment success notification
        if: success()
        run: echo "Deployment succeeded for $GITHUB_SHA"

      - name: Deployment failure notification
        if: failure()
        run: echo "Deployment failed for $GITHUB_SHA"