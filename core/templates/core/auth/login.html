{% extends "core/base.html" %}
{% block title %}Login – Teamflow{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4"><i class="bi bi-box-arrow-in-right"></i> Log in</h2>
                <form method="post" action="{% url 'core:login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    {% if form.non_field_errors %}
                    <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">Log in</button>
                </form>
                <p class="mt-3 mb-0 text-center text-muted small">No account? <a href="{% url 'core:register' %}">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
