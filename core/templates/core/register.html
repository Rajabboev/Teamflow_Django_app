{% extends "core/base.html" %}
{% block title %}Register – Teamflow{% endblock %}
{% block content %}
<h1>Register</h1>
<form method="post" action="">
    {% csrf_token %}
    {{ form.as_p }}
    <p><button type="submit" class="btn">Register</button></p>
</form>
<p>Already have an account? <a href="{% url 'core:login' %}">Log in</a></p>
{% endblock %}
