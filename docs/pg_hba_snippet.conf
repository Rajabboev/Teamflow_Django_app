# Add this line to pg_hba.conf on the PostgreSQL server (10.205.235.31)
#
# Where to find pg_hba.conf:
#   Linux: often /etc/postgresql/<version>/main/pg_hba.conf or $PGDATA/pg_hba.conf
#   Windows: %PGDATA%\pg_hba.conf (e.g. C:\Program Files\PostgreSQL\16\data\pg_hba.conf)
#
# Option A: Allow from any IP (use only in trusted networks)
host    teamflow    teamflow_user    0.0.0.0/0    scram-sha-256
#
# Option B: Allow from 10.x.x.x subnet only
# host    teamflow    teamflow_user    10.0.0.0/8    scram-sha-256
#
# Option C: Allow from one specific client IP (replace with your machine's IP)
# host    teamflow    teamflow_user    YOUR_IP/32    scram-sha-256
#
# If your PostgreSQL is older and uses md5 auth, use md5 instead of scram-sha-256:
# host    teamflow    teamflow_user    0.0.0.0/0    md5
#
# Then reload PostgreSQL:
#   Linux:   sudo systemctl reload postgresql   OR   pg_ctl reload -D /path/to/data
#   Windows: Restart PostgreSQL service
#   Or in psql: SELECT pg_reload_conf();
